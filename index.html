<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a1f3a">
<title>Sutherland European Adventure 2026</title>
<style>
:root {
  --navy:#1a1f3a; --gold:#c9a84c; --gold-light:#e8d5a3; --stone:#f5f0e8;
  --stone-dark:#e8e0d0; --text:#2c2c2c; --text-muted:#6b6b6b; --white:#fff;
  --green:#1a5c3a; --green-light:#e8f4ee; --purple:#7c3d8f; --amber:#8b5e00;
  --blue:#2d6a8f; --blue-light:#e8f2f8; --red:#c0392b;
  --shadow:0 2px 12px rgba(26,31,58,.10); --shadow-lg:0 8px 32px rgba(26,31,58,.15);
  --radius:12px; --radius-sm:8px; --safe-bottom:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:Georgia,serif;background:var(--stone);color:var(--text);min-height:100vh;overflow-x:hidden}

/* ── PIN SCREEN ── */
#pin-screen{position:fixed;inset:0;background:var(--navy);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px}
.pin-logo{font-size:48px;margin-bottom:8px}
.pin-title{font-size:22px;color:var(--gold);font-family:Georgia,serif;text-align:center;margin-bottom:4px}
.pin-sub{font-size:13px;color:rgba(255,255,255,.5);font-family:Arial,sans-serif;margin-bottom:32px;text-align:center}
.pin-dots{display:flex;gap:12px;margin-bottom:24px}
.pin-dot{width:14px;height:14px;border-radius:50%;background:rgba(255,255,255,.2);transition:.2s}
.pin-dot.filled{background:var(--gold)}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;width:240px}
.pin-btn{background:rgba(255,255,255,.1);border:none;color:#fff;font-size:22px;font-family:Arial,sans-serif;font-weight:600;border-radius:50%;width:72px;height:72px;cursor:pointer;transition:.15s;display:flex;align-items:center;justify-content:center}
.pin-btn:active{background:var(--gold);color:var(--navy);transform:scale(.93)}
.pin-btn.del{font-size:18px}
.pin-error{color:#e74c3c;font-size:13px;font-family:Arial,sans-serif;margin-top:12px;height:18px;text-align:center}

/* ── HEADER ── */
.app-header{background:var(--navy);color:#fff;padding:14px 16px 0;position:sticky;top:0;z-index:100;box-shadow:var(--shadow-lg)}
.header-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px}
.trip-title{font-size:16px;font-weight:700;color:var(--gold);letter-spacing:.3px;line-height:1.3;font-family:Georgia,serif}
.trip-dates{font-size:11px;color:rgba(255,255,255,.55);font-family:Arial,sans-serif;margin-top:2px}
.header-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0;margin-left:12px}
.days-to-go{font-size:22px;font-weight:700;color:var(--gold);line-height:1}
.days-label{font-size:10px;color:rgba(255,255,255,.5);font-family:Arial,sans-serif;text-transform:uppercase;letter-spacing:.5px}
.lock-btn{background:none;border:none;color:rgba(255,255,255,.4);font-size:16px;cursor:pointer;padding:2px}
.progress-bar-wrap{margin-bottom:10px}
.progress-label{display:flex;justify-content:space-between;font-size:10px;color:rgba(255,255,255,.4);font-family:Arial,sans-serif;margin-bottom:4px}
.progress-track{height:3px;background:rgba(255,255,255,.15);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--gold),#e8d5a3);border-radius:2px;transition:width 1s ease}
.segment-tabs{display:flex;overflow-x:auto;scrollbar-width:none;gap:2px;padding-bottom:1px}
.segment-tabs::-webkit-scrollbar{display:none}
.seg-tab{flex-shrink:0;padding:7px 10px 9px;border:none;background:transparent;color:rgba(255,255,255,.45);font-size:10px;font-family:Arial,sans-serif;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:2px}
.seg-tab .te{font-size:15px}.seg-tab .tl{font-size:9px;text-transform:uppercase;letter-spacing:.4px}
.seg-tab.active{color:var(--gold);border-bottom-color:var(--gold)}

/* ── BOTTOM NAV ── */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--white);border-top:1px solid var(--stone-dark);padding:8px 12px calc(8px + var(--safe-bottom));display:flex;gap:8px;z-index:90;box-shadow:0 -4px 20px rgba(0,0,0,.08)}
.nav-btn{flex:1;padding:10px 6px;border:none;border-radius:var(--radius-sm);font-size:12px;font-family:Arial,sans-serif;font-weight:700;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;transition:.15s}
.nav-btn:active{transform:scale(.96)}
.nav-btn .nb-icon{font-size:18px;line-height:1}
.nav-btn .nb-label{font-size:9px;text-transform:uppercase;letter-spacing:.4px}
.nav-btn.primary{background:var(--navy);color:var(--gold)}
.nav-btn.secondary{background:var(--stone-dark);color:var(--text-muted)}
.nav-btn.active-docs{background:var(--amber);color:#fff}

/* ── MAIN ── */
.main{padding:16px 16px 120px;max-width:600px;margin:0 auto}

/* ── SEGMENT HEADER ── */
.segment-header{display:flex;align-items:center;gap:10px;margin-bottom:14px;padding:12px 14px;border-radius:var(--radius);background:var(--white);box-shadow:var(--shadow)}
.seg-icon{font-size:26px;flex-shrink:0}.seg-name{font-size:15px;font-weight:700;color:var(--navy)}.seg-count{font-size:12px;color:var(--text-muted);font-family:Arial,sans-serif;margin-top:1px}

/* ── DAY CARD ── */
.day-card{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:10px;overflow:hidden;transition:box-shadow .2s}
.day-card.today{box-shadow:0 0 0 2px var(--gold),var(--shadow-lg)}
.day-card-header{cursor:pointer;user-select:none}

/* Hero image */
.day-hero-svg{width:100%;height:160px;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden;cursor:pointer}
.day-hero-svg::after{content:'';position:absolute;bottom:0;left:0;right:0;height:50px;background:linear-gradient(to top,rgba(0,0,0,.35),transparent)}
.hero-emoji{font-size:52px;line-height:1;filter:drop-shadow(0 2px 8px rgba(0,0,0,.4));z-index:1}
.hero-label{font-size:13px;font-weight:700;color:rgba(255,255,255,.95);font-family:Georgia,serif;margin-top:8px;letter-spacing:.3px;text-shadow:0 1px 4px rgba(0,0,0,.5);z-index:1}
.hero-sublabel{font-size:10px;color:rgba(255,255,255,.65);font-family:Arial,sans-serif;margin-top:3px;text-shadow:0 1px 3px rgba(0,0,0,.4);z-index:1}
/* Stars effect for night scenes */
.hero-stars{position:absolute;inset:0;z-index:0}
.day-hero-placeholder{width:100%;height:80px;display:flex;align-items:center;justify-content:center;font-size:36px;background:linear-gradient(135deg,var(--stone),var(--stone-dark))}

/* Header info */
.day-header-info{padding:12px 14px 8px;display:flex;align-items:flex-start;gap:10px}
.day-flag-date{flex-shrink:0;display:flex;flex-direction:column;align-items:center;min-width:42px}
.day-flag{font-size:20px;line-height:1}
.day-date-label{font-size:9px;color:var(--text-muted);font-family:Arial,sans-serif;text-transform:uppercase;letter-spacing:.3px;margin-top:3px;text-align:center}
.day-main{flex:1;min-width:0}
.day-location{font-size:14px;font-weight:700;color:var(--navy);line-height:1.3;margin-bottom:3px}
.day-preview{font-size:12px;color:var(--text-muted);font-family:Arial,sans-serif;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.day-chevron{flex-shrink:0;color:var(--text-muted);font-size:11px;margin-top:3px;transition:transform .25s}
.day-card.open .day-chevron{transform:rotate(180deg)}
.tag-row{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px}
.tag{font-size:9px;font-family:Arial,sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:.4px;padding:2px 7px;border-radius:20px}
.tag-included{background:var(--green-light);color:var(--green)}
.tag-booked{background:#fff3e0;color:#e65100}
.tag-flight{background:var(--blue-light);color:var(--blue)}
.tag-arrival{background:var(--purple-light,#f3eaf6);color:var(--purple)}

/* ── DAY BODY ── */
.day-body{display:none;border-top:1px solid var(--stone-dark)}
.day-card.open .day-body{display:block}
.day-section{padding:11px 14px;border-bottom:1px solid var(--stone-dark)}
.day-section:last-child{border-bottom:none}
.section-label{font-size:9px;font-family:Arial,sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--text-muted);margin-bottom:5px}
.section-content{font-size:13px;font-family:Arial,sans-serif;line-height:1.6;color:var(--text)}
.accom-icon{font-size:15px;margin-right:6px}
.excursion-block{background:var(--green-light);border-left:3px solid var(--green);border-radius:0 var(--radius-sm) var(--radius-sm) 0;padding:9px 11px;font-size:13px;font-family:Arial,sans-serif;line-height:1.5;color:#1a3d2a}
.excursion-block.booked{background:#fff8e8;border-left-color:var(--gold);color:#5a3e00}

/* ── ACTION BUTTONS ── */
.action-row{display:flex;gap:6px;flex-wrap:wrap;padding:10px 14px;background:var(--stone);border-top:1px solid var(--stone-dark)}
.btn{flex:1;min-width:80px;padding:9px 10px;border-radius:var(--radius-sm);border:none;font-size:11px;font-family:Arial,sans-serif;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px;text-decoration:none;transition:opacity .15s,transform .1s;text-align:center}
.btn:active{transform:scale(.97);opacity:.85}
.btn-map{background:var(--navy);color:#fff}
.btn-book{background:var(--gold);color:var(--navy)}
.btn-ticket{background:var(--red);color:#fff}
.btn-rest{background:#8b1a1a;color:#fff}

/* ── NOTES ── */
.notes-section{padding:10px 14px;background:#fffdf5;border-top:1px solid var(--stone-dark)}
.notes-label{display:flex;align-items:center;gap:5px;font-size:10px;font-family:Arial,sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--amber);margin-bottom:6px}
.notes-textarea{width:100%;min-height:68px;padding:8px 10px;border:1.5px solid var(--stone-dark);border-radius:var(--radius-sm);font-size:13px;font-family:Arial,sans-serif;color:var(--text);background:#fff;resize:vertical;outline:none;transition:border-color .2s;line-height:1.5}
.notes-textarea:focus{border-color:var(--gold)}
.notes-textarea::placeholder{color:#bbb}
.notes-saved{font-size:10px;font-family:Arial,sans-serif;color:var(--green);margin-top:3px;opacity:0;transition:opacity .3s;height:13px}
.notes-saved.show{opacity:1}

/* ── TODAY BADGE ── */
.today-badge{display:inline-flex;align-items:center;gap:3px;background:var(--gold);color:var(--navy);font-size:9px;font-family:Arial,sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:.4px;padding:2px 6px;border-radius:10px;margin-left:6px;vertical-align:middle}

/* ── DOCS PANEL ── */
#docs-panel{display:none;padding:16px 16px 120px;max-width:600px;margin:0 auto}
.docs-header{background:var(--white);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);margin-bottom:14px}
.docs-header h2{font-size:16px;color:var(--navy);margin-bottom:4px}
.docs-header p{font-size:12px;color:var(--text-muted);font-family:Arial,sans-serif;line-height:1.5}
.doc-category{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:12px;overflow:hidden}
.doc-cat-header{padding:12px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;background:var(--stone)}
.doc-cat-icon{font-size:20px}
.doc-cat-title{font-size:14px;font-weight:700;color:var(--navy);flex:1}
.doc-cat-chev{color:var(--text-muted);font-size:11px;transition:transform .25s}
.doc-category.open .doc-cat-chev{transform:rotate(180deg)}
.doc-cat-body{display:none;padding:12px 14px;border-top:1px solid var(--stone-dark)}
.doc-category.open .doc-cat-body{display:block}
.doc-item{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:1px solid var(--stone-dark)}
.doc-item:last-child{border-bottom:none}
.doc-item-info{flex:1}
.doc-item-name{font-size:13px;font-weight:700;color:var(--navy)}
.doc-item-detail{font-size:11px;color:var(--text-muted);font-family:Arial,sans-serif;margin-top:2px}
.doc-link-btn{background:var(--navy);color:var(--gold);border:none;border-radius:var(--radius-sm);padding:6px 11px;font-size:11px;font-family:Arial,sans-serif;font-weight:700;cursor:pointer;text-decoration:none;white-space:nowrap;display:inline-flex;align-items:center;gap:4px}
.doc-note-area{width:100%;margin-top:10px;padding:8px 10px;border:1.5px solid var(--stone-dark);border-radius:var(--radius-sm);font-size:12px;font-family:Arial,sans-serif;min-height:60px;resize:vertical;outline:none;background:#fff}
.doc-note-area:focus{border-color:var(--gold)}
.doc-save-btn{margin-top:6px;background:var(--amber);color:#fff;border:none;border-radius:var(--radius-sm);padding:7px 14px;font-size:11px;font-family:Arial,sans-serif;font-weight:700;cursor:pointer}
.doc-saved{font-size:10px;font-family:Arial,sans-serif;color:var(--green);margin-left:8px;opacity:0;transition:opacity .3s}
.doc-saved.show{opacity:1}
.doc-url-input{width:100%;padding:8px 10px;border:1.5px solid var(--stone-dark);border-radius:var(--radius-sm);font-size:12px;font-family:Arial,sans-serif;outline:none;background:#fff;margin-top:6px}
.doc-url-input:focus{border-color:var(--gold)}

@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.day-card{animation:fadeIn .22s ease both}
.day-card:nth-child(2){animation-delay:.04s}.day-card:nth-child(3){animation-delay:.08s}
.day-card:nth-child(4){animation-delay:.12s}.day-card:nth-child(5){animation-delay:.16s}
</style>
</head>
<body>

<!-- ── PIN SCREEN ── -->
<div id="pin-screen">
  <div class="pin-logo">🌍</div>
  <div class="pin-title">Sutherland European Adventure</div>
  <div class="pin-sub">Enter your 4-digit PIN to access</div>
  <div class="pin-dots" id="pinDots">
    <div class="pin-dot" id="d0"></div>
    <div class="pin-dot" id="d1"></div>
    <div class="pin-dot" id="d2"></div>
    <div class="pin-dot" id="d3"></div>
  </div>
  <div class="pin-pad">
    <button class="pin-btn" onclick="pinPress('1')">1</button>
    <button class="pin-btn" onclick="pinPress('2')">2</button>
    <button class="pin-btn" onclick="pinPress('3')">3</button>
    <button class="pin-btn" onclick="pinPress('4')">4</button>
    <button class="pin-btn" onclick="pinPress('5')">5</button>
    <button class="pin-btn" onclick="pinPress('6')">6</button>
    <button class="pin-btn" onclick="pinPress('7')">7</button>
    <button class="pin-btn" onclick="pinPress('8')">8</button>
    <button class="pin-btn" onclick="pinPress('9')">9</button>
    <button class="pin-btn" onclick="pinPress('clear')" style="font-size:13px">CLR</button>
    <button class="pin-btn" onclick="pinPress('0')">0</button>
    <button class="pin-btn del" onclick="pinPress('del')">⌫</button>
  </div>
  <div class="pin-error" id="pinError"></div>
  <div style="margin-top:20px;font-size:11px;color:rgba(255,255,255,.3);font-family:Arial,sans-serif;text-align:center">Default PIN: 2026<br>Change in Settings after login</div>
</div>

<!-- ── APP (hidden until PIN) ── -->
<div id="app" style="display:none">

<div class="app-header">
  <div class="header-top">
    <div>
      <div class="trip-title">🌍 Sutherland European Adventure</div>
      <div class="trip-dates">14 Sep – 24 Oct 2026 &nbsp;·&nbsp; 41 days</div>
    </div>
    <div class="header-right">
      <div style="display:flex;align-items:center;gap:6px">
        <div>
          <div class="days-to-go" id="countdown">—</div>
          <div class="days-label" id="countdownLabel">days to go</div>
        </div>
        <button class="lock-btn" onclick="lockApp()" title="Lock">🔒</button>
      </div>
    </div>
  </div>
  <div class="progress-bar-wrap">
    <div class="progress-label">
      <span>14 Sep</span><span id="progressLabel">—</span><span>24 Oct</span>
    </div>
    <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  </div>
  <div class="segment-tabs" id="segTabs"></div>
</div>

<div class="main" id="main"></div>

<!-- Docs panel -->
<div id="docs-panel"></div>

<div class="bottom-nav">
  <button class="nav-btn primary" onclick="goToday()" id="todayBtn">
    <span class="nb-icon">📍</span><span class="nb-label">Today</span>
  </button>
  <button class="nav-btn secondary" onclick="showItinerary()" id="itinBtn">
    <span class="nb-icon">📅</span><span class="nb-label">Itinerary</span>
  </button>
  <button class="nav-btn secondary" onclick="showDocs()" id="docsBtn">
    <span class="nb-icon">📁</span><span class="nb-label">Documents</span>
  </button>
  <button class="nav-btn secondary" onclick="showSettings()" id="settBtn">
    <span class="nb-icon">⚙️</span><span class="nb-label">Settings</span>
  </button>
</div>

</div><!-- end #app -->

// PIN SYSTEM
// ════════════════════════════════════════
let pinEntry = '';
const STORAGE_KEY = 'suth_pin_2026';
const SESSION_KEY = 'suth_session';

function getPin() {
  return localStorage.getItem(STORAGE_KEY) || '2026';
}

function checkSession() {
  const s = sessionStorage.getItem(SESSION_KEY);
  if (s === 'ok') unlockApp(true);
}

function pinPress(val) {
  if (val === 'del') { pinEntry = pinEntry.slice(0,-1); }
  else if (val === 'clear') { pinEntry = ''; }
  else if (pinEntry.length < 4) { pinEntry += val; }
  updatePinDots();
  if (pinEntry.length === 4) {
    setTimeout(checkPin, 150);
  }
}

function updatePinDots() {
  for (let i=0; i<4; i++) {
    document.getElementById('d'+i).classList.toggle('filled', i < pinEntry.length);
  }
}

function checkPin() {
  if (pinEntry === getPin()) {
    sessionStorage.setItem(SESSION_KEY,'ok');
    unlockApp(false);
  } else {
    document.getElementById('pinError').textContent = 'Incorrect PIN. Try again.';
    pinEntry = '';
    updatePinDots();
    setTimeout(() => document.getElementById('pinError').textContent = '', 2000);
  }
}

function unlockApp(silent) {
  document.getElementById('pin-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  if (!silent) {
    updateHeaderStats();
    buildTabs();
    buildMain();
  }
}

function lockApp() {
  sessionStorage.removeItem(SESSION_KEY);
  pinEntry = '';
  updatePinDots();
  document.getElementById('pin-screen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
}

// DATES
// ════════════════════════════════════════
const TRIP_START = new Date('2026-09-14');
const TRIP_END   = new Date('2026-10-24');

function parseDate(str) {
  const p = str.split(' ');
  const mo = {Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11};
  return new Date(2026, mo[p[2]], parseInt(p[1]));
}

function updateHeaderStats() {
  const today = new Date(); today.setHours(0,0,0,0);
  const start = new Date(TRIP_START); start.setHours(0,0,0,0);
  const end   = new Date(TRIP_END);   end.setHours(0,0,0,0);
  const total = (end-start)/86400000;
  const elapsed = (today-start)/86400000;
  const el = document.getElementById('countdown');
  const lab = document.getElementById('countdownLabel');
  const fill = document.getElementById('progressFill');
  const prog = document.getElementById('progressLabel');
  if (!el) return;
  if (today < start) {
    el.textContent = Math.ceil((start-today)/86400000);
    lab.textContent = 'days to go';
    fill.style.width = '0%'; prog.textContent = 'Not yet departed';
  } else if (today > end) {
    el.textContent = '✓'; lab.textContent = 'trip complete!';
    fill.style.width = '100%'; prog.textContent = 'Trip complete!';
  } else {
    el.textContent = Math.ceil((end-today)/86400000);
    lab.textContent = 'days left';
    fill.style.width = Math.min(100,(elapsed/total)*100).toFixed(1)+'%';
    prog.textContent = 'Day '+Math.floor(elapsed+1)+' of '+total;
  }
}

function findToday() {
  const today = new Date(); today.setHours(0,0,0,0);
  for (let si=0; si<SEGMENTS.length; si++) {
    for (let di=0; di<SEGMENTS[si].days.length; di++) {
      const d = parseDate(SEGMENTS[si].days[di].date);
      if (d.getTime()===today.getTime()) return {seg:si,day:di};
    }
  }
  const start = new Date(TRIP_START); start.setHours(0,0,0,0);
  return today < start ? {seg:0,day:0} : {seg:SEGMENTS.length-1,day:0};
}

function buildTabs() {
  const c = document.getElementById('segTabs');
  if (!c) return;
  c.innerHTML = '';
  SEGMENTS.forEach((seg,i) => {
    const btn = document.createElement('button');
    btn.className = 'seg-tab'+(i===activeSegment?' active':'');
    btn.innerHTML = `<span class="te">${seg.emoji}</span><span class="tl">${seg.name.split(' ')[0]}</span>`;
    btn.onclick = ()=>{ activeSegment=i; buildTabs(); buildMain(); showItinerary(); };
    c.appendChild(btn);
  });
}

function btnColor(type) {
  if (type==='ticket') return 'btn-ticket';
  if (type==='rest') return 'btn-rest';
  if (type==='book') return 'btn-book';
  return 'btn-map';
}
function btnIcon(type) {
  if (type==='ticket') return '🎟';
  if (type==='rest') return '🍽';
  if (type==='book') return '🔗';
  return 'ℹ️';
}

function buildMain() {
  const c = document.getElementById('main');
  if (!c) return;
  const seg = SEGMENTS[activeSegment];
  const today = new Date(); today.setHours(0,0,0,0);
  const ti = findToday();
  c.innerHTML = '';

  // Segment header
  const hdr = document.createElement('div');
  hdr.className = 'segment-header';
  hdr.innerHTML = `<div class="seg-icon">${seg.emoji}</div>
    <div><div class="seg-name">${seg.name}</div>
    <div class="seg-count">${seg.days.length} day${seg.days.length!==1?'s':''}</div></div>`;
  c.appendChild(hdr);

  seg.days.forEach((day,di) => {
    const isToday = ti.seg===activeSegment && ti.day===di && parseDate(day.date).getTime()===today.getTime();
    const card = document.createElement('div');
    card.className = 'day-card'+(isToday?' today':'');
    card.id = `card-${activeSegment}-${di}`;
    const nk = `${activeSegment}-${di}`;

    const tagHtml = (day.tags||[]).map(t=>{
      if(t==='included') return '<span class="tag tag-included">✓ Included</span>';
      if(t==='booked') return '<span class="tag tag-booked">★ Pre-booked</span>';
      if(t==='flight') return '<span class="tag tag-flight">✈ Flight</span>';
      if(t==='arrival') return '<span class="tag tag-arrival">🎉 Arrival</span>';
      return '';
    }).join('');

    let excHtml = '';
    if (day.excursion) {
      const isBkd = day.excursion.includes('BOOKED')||day.excursion.includes('INCLUDED');
      excHtml = `<div class="day-section">
        <div class="section-label">Excursion / Activity</div>
        <div class="excursion-block ${isBkd?'booked':''}">${day.excursion}</div></div>`;
    }

    const mapUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(day.location+' '+day.date.split(' ')[2]+' 2026')}`;
    let linkBtns = `<a class="btn btn-map" href="${mapUrl}" target="_blank">🗺 Map</a>`;
    (day.links||[]).forEach(l => {
      linkBtns += `<a class="btn ${btnColor(l.type)}" href="${l.url}" target="_blank">${btnIcon(l.type)} ${l.label}</a>`;
    });

    const heroBg = day.img || 'linear-gradient(160deg,#1a1f3a,#2d6a8f)';
    const heroEmoji = day.heroEmoji || day.flag;
    const heroLabel = day.heroLabel || day.location;
    const heroSub = day.heroSub || '';
    const imgHtml = `<div style="width:100%;height:160px;min-height:160px;display:flex;flex-direction:column;align-items:center;justify-content:center;background:${heroBg};position:relative;overflow:hidden;flex-shrink:0">
      <div style="font-size:54px;line-height:1;z-index:1;filter:drop-shadow(0 2px 8px rgba(0,0,0,.5))">${heroEmoji}</div>
      <div style="font-size:13px;font-weight:700;color:rgba(255,255,255,.95);font-family:Georgia,serif;margin-top:8px;letter-spacing:.3px;text-shadow:0 1px 4px rgba(0,0,0,.6);z-index:1;text-align:center;padding:0 12px">${heroLabel}</div>
      ${heroSub ? `<div style="font-size:10px;color:rgba(255,255,255,.7);font-family:Arial,sans-serif;margin-top:3px;text-shadow:0 1px 3px rgba(0,0,0,.5);z-index:1;text-align:center;padding:0 12px">${heroSub}</div>` : ''}
      <div style="position:absolute;bottom:0;left:0;right:0;height:50px;background:linear-gradient(to top,rgba(0,0,0,.4),transparent)"></div>
    </div>`;

    card.innerHTML = `
      <div onclick="toggleCard('card-${activeSegment}-${di}')">
        ${imgHtml}
      </div>
      <div class="day-card-header" onclick="toggleCard('card-${activeSegment}-${di}')">
        <div class="day-header-info">
          <div class="day-flag-date">
            <div class="day-flag">${day.flag}</div>
            <div class="day-date-label">${day.date.split(' ').slice(0,2).join(' ')}</div>
          </div>
          <div class="day-main">
            <div class="day-location">${day.location}${isToday?'<span class="today-badge">📍 Today</span>':''}</div>
            <div class="day-preview">${day.activity}</div>
            ${tagHtml?`<div class="tag-row">${tagHtml}</div>`:''}
          </div>
          <div class="day-chevron">▼</div>
        </div>
      </div>
      <div class="day-body">
        <div class="day-section">
          <div class="section-label">📋 Plan for the Day</div>
          <div class="section-content">${day.activity}</div>
        </div>
        <div class="day-section">
          <div class="section-label">🏨 Accommodation</div>
          <div class="section-content"><span class="accom-icon">🛏</span>${day.accommodation}</div>
        </div>
        <div class="day-section">
          <div class="section-label">🚗 Getting Around</div>
          <div class="section-content">${day.transport}</div>
        </div>
        ${excHtml}
        <div class="action-row">${linkBtns}</div>
        <div class="notes-section">
          <div class="notes-label">✏️ Your Notes</div>
          <textarea class="notes-textarea" id="note-${nk}"
            placeholder="Last-minute changes, restaurant finds, tips, reminders…"
            oninput="saveNote('${nk}')">${notes[nk]||''}</textarea>
          <div class="notes-saved" id="saved-${nk}">✓ Saved</div>
        </div>
      </div>`;

    c.appendChild(card);
    if (isToday) card.classList.add('open');
  });
}

function toggleCard(id) {
  document.getElementById(id)?.classList.toggle('open');
}

function saveNote(key) {
  notes[key] = document.getElementById('note-'+key)?.value || '';
  try { localStorage.setItem('suth_notes_2026', JSON.stringify(notes)); } catch(e) {}
  const s = document.getElementById('saved-'+key);
  if (s) { s.classList.add('show'); clearTimeout(s._t); s._t = setTimeout(()=>s.classList.remove('show'),1800); }
}

  DOC_CATEGORIES.forEach(cat => {
    const div = document.createElement('div');
    div.className = 'doc-category';
    div.id = 'cat-'+cat.id;
    let itemsHtml = cat.items.map((item,i)=>{
      const key = cat.id+'-'+i;
      const saved = docNotes[key] || {url:'',note:''};
      return `<div class="doc-item">
        <div class="doc-item-info">
          <div class="doc-item-name">${item.name}</div>
          <div class="doc-item-detail">${item.detail}</div>
          <input class="doc-url-input" id="url-${key}" placeholder="Paste booking URL or reference number…"
            value="${saved.url||''}" oninput="saveDocNote('${key}')">
          <textarea class="doc-note-area" id="docnote-${key}"
            placeholder="Notes: confirmation number, PIN, contact…"
            oninput="saveDocNote('${key}')">${saved.note||''}</textarea>
        </div>
      </div>`;
    }).join('');

    div.innerHTML = `
      <div class="doc-cat-header" onclick="toggleDocCat('cat-${cat.id}')">
        <div class="doc-cat-icon">${cat.icon}</div>
        <div class="doc-cat-title">${cat.title}</div>
        <div class="doc-cat-chev">▼</div>
      </div>
      <div class="doc-cat-body">${itemsHtml}</div>`;
    c.appendChild(div);
  });
}

function toggleDocCat(id) {
  document.getElementById(id)?.classList.toggle('open');
}

function saveDocNote(key) {
  docNotes[key] = {
    url: document.getElementById('url-'+key)?.value || '',
    note: document.getElementById('docnote-'+key)?.value || ''
  };
  try { localStorage.setItem('suth_docnotes_2026', JSON.stringify(docNotes)); } catch(e) {}
}

// ════════════════════════════════════════
// SETTINGS
// ════════════════════════════════════════
function showSettings() {
  setPanel('settings');
  const c = document.getElementById('main');
  const dp = document.getElementById('docs-panel');
  dp.style.display = 'none';
  c.style.display = 'block';
  c.innerHTML = `
    <div class="docs-header" style="margin-bottom:14px">
      <h2>⚙️ Settings</h2>
      <p>Manage your PIN and app preferences.</p>
    </div>
    <div class="doc-category open" style="margin-bottom:12px">
      <div class="doc-cat-header" style="cursor:default">
        <div class="doc-cat-icon">🔐</div>
        <div class="doc-cat-title">Change PIN</div>
      </div>
      <div class="doc-cat-body" style="display:block">
        <p style="font-size:13px;font-family:Arial,sans-serif;color:var(--text-muted);margin-bottom:12px">Current PIN: <strong>${getPin()}</strong>. Enter a new 4-digit PIN below.</p>
        <input id="newPin1" type="number" maxlength="4" placeholder="New 4-digit PIN"
          style="width:100%;padding:9px 11px;border:1.5px solid var(--stone-dark);border-radius:8px;font-size:15px;font-family:Arial,sans-serif;outline:none;margin-bottom:8px">
        <input id="newPin2" type="number" maxlength="4" placeholder="Confirm new PIN"
          style="width:100%;padding:9px 11px;border:1.5px solid var(--stone-dark);border-radius:8px;font-size:15px;font-family:Arial,sans-serif;outline:none;margin-bottom:8px">
        <button onclick="changePin()"
          style="background:var(--navy);color:var(--gold);border:none;border-radius:8px;padding:11px 24px;font-size:14px;font-family:Arial,sans-serif;font-weight:700;cursor:pointer;width:100%">
          Update PIN
        </button>
        <div id="pinMsg" style="font-size:12px;font-family:Arial,sans-serif;margin-top:8px;height:16px"></div>
      </div>
    </div>
    <div class="doc-category open">
      <div class="doc-cat-header" style="cursor:default">
        <div class="doc-cat-icon">ℹ️</div>
        <div class="doc-cat-title">About</div>
      </div>
      <div class="doc-cat-body" style="display:block">
        <p style="font-size:13px;font-family:Arial,sans-serif;color:var(--text-muted);line-height:1.6">
          <strong>Sutherland European Adventure 2026</strong><br>
          41 days · 6 countries · 2 Viking cruises · 30+ ports<br>
          14 September – 24 October 2026<br><br>
          Notes and document data are stored locally on this device and are not shared or uploaded anywhere.<br><br>
          Built with ❤️ using Claude AI.
        </p>
      </div>
    </div>`;
}

function changePin() {
  const p1 = document.getElementById('newPin1')?.value;
  const p2 = document.getElementById('newPin2')?.value;
  const msg = document.getElementById('pinMsg');
  if (!p1 || p1.length !== 4 || !/^\d{4}$/.test(p1)) {
    msg.textContent = '❌ PIN must be exactly 4 digits'; msg.style.color='var(--red)'; return;
  }
  if (p1 !== p2) {
    msg.textContent = '❌ PINs do not match'; msg.style.color='var(--red)'; return;
  }
  localStorage.setItem(STORAGE_KEY, p1);
  msg.textContent = '✓ PIN updated successfully'; msg.style.color='var(--green)';
  setTimeout(()=>{msg.textContent='';},2500);
}

// ════════════════════════════════════════
// PANEL ROUTING
// ════════════════════════════════════════
function setPanel(p) {
  activePanel = p;
  ['todayBtn','itinBtn','docsBtn','settBtn'].forEach(id=>{
    document.getElementById(id)?.classList.remove('primary','secondary','active-docs');
    document.getElementById(id)?.classList.add('secondary');
  });
  if (p==='itinerary') { document.getElementById('itinBtn')?.classList.replace('secondary','primary'); }
  else if (p==='docs')  { document.getElementById('docsBtn')?.classList.replace('secondary','active-docs'); }
  else if (p==='settings') { document.getElementById('settBtn')?.classList.replace('secondary','primary'); }
}

function showItinerary() {
  setPanel('itinerary');
  document.getElementById('main').style.display = 'block';
  document.getElementById('docs-panel').style.display = 'none';
  buildMain();
}

function showDocs() {
  setPanel('docs');
  document.getElementById('main').style.display = 'none';
  const dp = document.getElementById('docs-panel');
  dp.style.display = 'block';
  buildDocsPanel();
}

function goToday() {
  const info = findToday();
  if (info.seg !== activeSegment) {
    activeSegment = info.seg;
    buildTabs();
  }
  showItinerary();
  setTimeout(()=>{
    const el = document.getElementById(`card-${info.seg}-${info.day}`);
    if (el) { el.scrollIntoView({behavior:'smooth',block:'start'}); el.classList.add('open'); }
  }, 150);
}

checkSession();
setInterval(updateHeaderStats, 60000);
</script>
